name: Deploy to Vercel

on:
  push:
    branches: [main]

concurrency:
  group: vercel-production
  cancel-in-progress: true

# Vercel CLI reads these from the environment, so no --token flag is needed.
# Passing --token= with an empty secret crashes with "missing a value";
# the env-var form fails with a clear "no credentials" error instead.
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

jobs:
  deploy:
    name: Production deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Vercel secrets are configured
        run: |
          missing=""
          [ -z "$VERCEL_TOKEN" ] && missing="$missing VERCEL_TOKEN"
          [ -z "$VERCEL_ORG_ID" ] && missing="$missing VERCEL_ORG_ID"
          [ -z "$VERCEL_PROJECT_ID" ] && missing="$missing VERCEL_PROJECT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing GitHub repo secrets:$missing"
            echo "Create a token at https://vercel.com/account/tokens and add it with:"
            echo "  gh secret set VERCEL_TOKEN -R BongaNdlovu/Last-Day-Words"
            exit 1
          fi
          echo "All Vercel secrets present."

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Pull Vercel env
        run: npx vercel pull --yes --environment=production

      - name: Verify Vite env configured
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || ! echo "$VITE_SUPABASE_URL" | grep -qE '^https://.*\.supabase\.co/?$'; then
            echo "::error::VITE_SUPABASE_URL missing or invalid (set GitHub secret VITE_SUPABASE_URL)"
            exit 1
          fi
          if [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::VITE_SUPABASE_ANON_KEY missing (set GitHub secret VITE_SUPABASE_ANON_KEY)"
            exit 1
          fi
          echo "Vite Supabase env present."

      - name: Build
        run: npm run build

      - name: Deploy
        run: npx vercel deploy --prebuilt --prod
